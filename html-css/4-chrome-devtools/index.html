<style>
  .subscribe-button {
    background-color: rgb(200, 0, 0);
    color: white;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    vertical-align: top;
    margin-right: 8px;
    margin-left: 20px;
    padding: 10px 16px;
    /* Transition property to control transitionss!! */
    transition: opacity 0.15s;
  }

  /* hover is a pseudo class!! */
  .subscribe-button:hover {
    opacity: 0.8;
  }
  .subscribe-button:active {
    opacity: 0.5;
  }

  .join-button {
    background-color: white;
    border-color: rgb(41, 118, 211);
    border-style: solid;
    border-width: 1px;
    vertical-align: top;
    color: rgb(41, 118, 211);
    border-radius: 2px;
    padding: 9px 16px;
    cursor: pointer;
    /* can set multiple elements by comma  */
    transition:
      background-color 0.15s,
      color 0.15s;
  }
  .join-button:hover {
    background-color: rgb(41, 118, 211);
    color: white;
  }
  .join-button:active {
    opacity: 0.7;
  }

  .tweet-button {
    background-color: rgb(2, 158, 255);
    color: white;
    border: none;
    vertical-align: top;
    border-radius: 8px;
    border-radius: 18px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    padding: 9px 15px;
    margin-left: 8px;
    transition: box-shadow 0.15s;
  }
  .tweet-button:hover {
    /* shadows: horizontal,vertical,blur value,color */
    box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
  }

  a,
  a:visited {
    color: inherit;
    text-decoration: none;
  }
</style>

<button class="subscribe-button">SUBSCRIBE</button>

<button class="join-button">JOIN</button>

<button class="tweet-button">Tweet</button>

<br>
<br>
<button><a href="exercise.html">Click to go to Exercises</a></button>
